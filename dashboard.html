<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>NIYANTRA - AI Study Operating System</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <script>  
        tailwind.config = {  
            theme: {  
                extend: {  
                    colors: {  
                        'primary-bg': '#0B0F1A',  
                        'card-bg': '#111827',  
                        'border-color': '#1F2937',  
                        'weak-red': '#EF4444',  
                        'warning-orange': '#F59E0B',  
                        'success-green': '#10B981',  
                        'active-blue': '#3B82F6',  
                        'secondary-gray': '#9CA3AF'  
                    }  
                }  
            }  
        }  
    </script>  
    <style>  
        * { transition: all 300ms ease; }  
        .sidebar-hidden { transform: translateX(-100%); }  
        .lift-hover:hover { transform: translateY(-2px); }  
        .canvas-container { width: 100%; height: 200px; position: relative; }  
        canvas { width: 100% !important; height: 100% !important; }  
    </style>  
</head>  
<body class="bg-primary-bg text-white font-sans min-h-screen overflow-hidden">  
    <div class="flex h-screen">  
        <!-- LEFT SIDEBAR -->  
        <div id="sidebar" class="w-64 bg-card-bg border-r border-border-color flex flex-col p-6 fixed h-full lg:static lg:translate-x-0 sidebar-hidden z-40 lg:z-auto overflow-y-auto">  
            <!-- Profile -->  
            <div class="mb-8">  
                <div class="w-16 h-16 bg-active-blue rounded-full flex items-center justify-center text-xl font-bold mb-3">N</div>  
                <input id="profileName" type="text" placeholder="Your Name" class="w-full bg-transparent border-b border-secondary-gray text-white placeholder-secondary-gray py-2 focus:outline-none focus:border-active-blue">  
            </div>  
  
            <!-- Class Selector -->  
            <div class="mb-6">  
                <label class="text-sm text-secondary-gray mb-2 block">Class</label>  
                <select id="classSelect" class="w-full bg-card-bg border border-secondary-gray rounded-lg p-3 text-white focus:outline-none focus:border-active-blue">  
                    <option value="6">Class 6</option>  
                    <option value="7">Class 7</option>  
                    <option value="8">Class 8</option>  
                    <option value="9">Class 9</option>  
                    <option value="10">Class 10</option>  
                    <option value="11">Class 11</option>  
                    <option value="12" selected>Class 12</option>  
                </select>  
            </div>  
  
            <!-- Exam Selector -->  
            <div class="mb-6">  
                <label class="text-sm text-secondary-gray mb-2 block">Exam</label>  
                <select id="examSelect" class="w-full bg-card-bg border border-secondary-gray rounded-lg p-3 text-white focus:outline-none focus:border-active-blue">  
                    <option value="JEE">JEE</option>  
                    <option value="NEET">NEET</option>  
                    <option value="NDA">NDA</option>  
                    <option value="KCET">KCET</option>  
                </select>  
            </div>  
  
            <!-- Subjects -->  
            <div class="flex-1">  
                <label class="text-sm text-secondary-gray mb-4 block">Subjects</label>  
                <div id="subjectsList" class="space-y-2">  
                    <button class="w-full text-left p-3 rounded-lg border border-transparent hover:border-active-blue hover:bg-active-blue/10 subject-btn" data-subject="Mathematics">📐 Mathematics</button>  
                    <button class="w-full text-left p-3 rounded-lg border border-transparent hover:border-active-blue hover:bg-active-blue/10 subject-btn" data-subject="Physics">⚛️ Physics</button>  
                    <button class="w-full text-left p-3 rounded-lg border border-transparent hover:border-active-blue hover:bg-active-blue/10 subject-btn" data-subject="Chemistry">🧪 Chemistry</button>  
                    <button class="w-full text-left p-3 rounded-lg border border-transparent hover:border-active-blue hover:bg-active-blue/10 subject-btn" data-subject="Biology">🧬 Biology</button>  
                    <button class="w-full text-left p-3 rounded-lg border border-transparent hover:border-active-blue hover:bg-active-blue/10 subject-btn" data-subject="Computer Science">💻 Computer Science</button>  
                    <button class="w-full text-left p-3 rounded-lg border border-transparent hover:border-active-blue hover:bg-active-blue/10 subject-btn" data-subject="English">📚 English</button>  
                </div>  
            </div>  
  
            <!-- Mode Buttons -->  
            <div class="mt-8 space-y-2 pt-8 border-t border-secondary-gray">  
                <button id="learnMode" class="w-full p-3 rounded-lg bg-active-blue/20 hover:bg-active-blue/30 mode-btn">📚 Learn Mode</button>  
                <button id="testMode" class="w-full p-3 rounded-lg bg-transparent border border-secondary-gray hover:border-active-blue hover:bg-active-blue/10 mode-btn">🧪 Test Mode</button>  
                <button id="revisionMode" class="w-full p-3 rounded-lg bg-transparent border border-secondary-gray hover:border-active-blue hover:bg-active-blue/10 mode-btn">🔄 Revision</button>  
                <button id="weaknessMode" class="w-full p-3 rounded-lg bg-transparent border border-secondary-gray hover:border-active-blue hover:bg-active-blue/10 mode-btn">⚠️ Weak Areas</button>  
            </div>  
        </div>  
  
        <!-- Mobile Menu Button -->  
        <button id="mobileMenuBtn" class="lg:hidden fixed top-6 left-6 z-50 p-3 bg-card-bg rounded-xl border border-secondary-gray">  
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">  
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>  
            </svg>  
        </button>  
  
        <!-- MAIN CONTENT -->  
        <div class="flex-1 flex flex-col ml-0 lg:ml-64 overflow-hidden">  
            <!-- TOP METRICS BAR -->  
            <div class="bg-card-bg border-b border-border-color p-6 flex items-center justify-between flex-wrap gap-4">  
                <div class="flex items-center space-x-6">  
                    <div class="text-2xl font-bold">NIYANTRA</div>  
                    <div id="topTasks" class="flex space-x-2 text-sm text-secondary-gray">  
                        <span>Practice Vectors</span>  
                        <span>|</span>  
                        <span>Revise Thermodynamics</span>  
                        <span>|</span>  
                        <span>Test: Calculus</span>  
                    </div>  
                </div>  
                <div class="flex items-center space-x-6 flex-wrap gap-4">  
                    <div class="text-right">  
                        <div id="performancePct" class="text-2xl font-bold text-success-green">87%</div>  
                        <div class="text-sm text-secondary-gray">Overall</div>  
                    </div>  
                    <div class="w-px h-8 bg-secondary-gray hidden sm:block"></div>  
                    <div class="text-center">  
                        <div id="weakAreas" class="text-lg font-semibold text-weak-red">2</div>  
                        <div class="text-sm text-secondary-gray">Weak Areas</div>  
                    </div>  
                    <div class="w-px h-8 bg-secondary-gray hidden sm:block"></div>  
                    <div class="text-center">  
                        <div id="pendingTasks" class="text-lg font-semibold text-warning-orange">5</div>  
                        <div class="text-sm text-secondary-gray">Pending</div>  
                    </div>  
                    <div class="w-px h-8 bg-secondary-gray hidden sm:block"></div>  
                    <div class="text-center">  
                        <div id="nextRevision" class="text-lg font-semibold text-active-blue">Tomorrow</div>  
                        <div class="text-sm text-secondary-gray">Revision Due</div>  
                    </div>  
                </div>  
            </div>  
  
            <!-- MAIN LAYOUT -->  
            <div class="flex-1 flex overflow-hidden">  
                <!-- WORK AREA -->  
                <div id="workArea" class="flex-1 p-8 overflow-y-auto">  
                    <!-- Dynamic content loads here -->  
                </div>  
  
                <!-- GRAPH ANALYTICS PANEL -->  
                <div class="w-80 bg-card-bg border-l border-border-color p-6 hidden xl:block overflow-y-auto">  
                    <h3 class="text-xl font-bold mb-6 flex items-center">  
                        📊 Analytics  
                        <button id="refreshGraphs" class="ml-auto p-2 hover:bg-active-blue/20 rounded-lg">  
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">  
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>  
                            </svg>  
                        </button>  
                    </h3>  
  
                    <!-- Performance Trend -->  
                    <div class="mb-8">  
                        <div class="text-sm text-secondary-gray mb-3">Performance Trend</div>  
                        <div class="canvas-container border border-secondary-gray rounded-lg bg-primary-bg p-2">  
                            <canvas id="trendCanvas"></canvas>  
                        </div>  
                    </div>  
  
                    <!-- Subject Accuracy -->  
                    <div class="mb-8">  
                        <div class="text-sm text-secondary-gray mb-3">Subject Accuracy</div>  
                        <div class="canvas-container border border-secondary-gray rounded-lg bg-primary-bg p-2">  
                            <canvas id="accuracyCanvas"></canvas>  
                        </div>  
                    </div>  
  
                    <!-- Weakness Heatmap -->  
                    <div>  
                        <div class="text-sm text-secondary-gray mb-3">Weakness Heatmap</div>  
                        <div id="weaknessHeatmap" class="space-y-2"></div>  
                    </div>  
                </div>  
            </div>  
        </div>  
    </div>  
  
    <script>  
        // GLOBAL STATE  
        let state = {  
            name: 'Student',  
            class: '12',  
            exam: 'JEE',  
            selectedSubject: 'Mathematics',  
            selectedMode: 'learn',  
            studyEntries: [],  
            testResults: [  
                { date: 'Week 1', score: 65 },  
                { date: 'Week 2', score: 72 },  
                { date: 'Week 3', score: 78 },  
                { date: 'Week 4', score: 85 },  
                { date: 'Week 5', score: 89 }  
            ],  
            performanceData: {  
                Mathematics: 85,  
                Physics: 78,  
                Chemistry: 92,  
                Biology: 88,  
                'Computer Science': 76,  
                English: 94  
            },  
            weakTopics: ['Vectors', 'Thermodynamics', 'Integration'],  
            pendingTasksCount: 5,  
            nextRevisionDate: 'Tomorrow'  
        };  
  
        // Initialize  
        function init() {  
            loadState();  
            renderSidebar();  
            renderMetrics();  
            renderGraphs();  
            updateWorkArea();  
            setupEventListeners();  
            handleResize();  
            window.addEventListener('resize', handleResize);  
        }  
  
        // Handle window resize  
        let resizeTimeout;  
        function handleResize() {  
            clearTimeout(resizeTimeout);  
            resizeTimeout = setTimeout(() => {  
                renderGraphs();  
            }, 250);  
        }  
  
        // LocalStorage  
        function saveState() {  
            try {  
                localStorage.setItem('niyantra_state', JSON.stringify(state));  
            } catch (e) {  
                console.error('Failed to save state:', e);  
            }  
        }  
  
        function loadState() {  
            try {  
                const saved = localStorage.getItem('niyantra_state');  
                if (saved) {  
                    const parsed = JSON.parse(saved);  
                    state = { ...state, ...parsed };  
                }  
            } catch (e) {  
                console.error('Failed to load state:', e);  
            }  
            document.getElementById('profileName').value = state.name;  
            document.getElementById('classSelect').value = state.class;  
            document.getElementById('examSelect').value = state.exam;  
        }  
  
        // Sidebar Events  
        function setupEventListeners() {  
            // Profile  
            document.getElementById('profileName').addEventListener('input', (e) => {  
                state.name = e.target.value || 'Student';  
                saveState();  
                renderMetrics();  
            });  
  
            // Selectors  
            document.getElementById('classSelect').addEventListener('change', (e) => {  
                state.class = e.target.value;  
                saveState();  
                updateWorkArea();  
            });  
  
            document.getElementById('examSelect').addEventListener('change', (e) => {  
                state.exam = e.target.value;  
                saveState();  
                updateWorkArea();  
            });  
  
            // Subjects  
            document.querySelectorAll('.subject-btn').forEach(btn => {  
                btn.addEventListener('click', (e) => {  
                    document.querySelectorAll('.subject-btn').forEach(b => {  
                        b.classList.remove('active', 'bg-active-blue/20', 'border-active-blue');  
                    });  
                    e.currentTarget.classList.add('active', 'bg-active-blue/20', 'border-active-blue');  
                    state.selectedSubject = e.currentTarget.dataset.subject;  
                    saveState();  
                    updateWorkArea();  
                });  
            });  
  
            // Mode buttons  
            document.getElementById('learnMode').addEventListener('click', (e) => {  
                setActiveMode('learn', e.currentTarget);  
            });  
            document.getElementById('testMode').addEventListener('click', (e) => {  
                setActiveMode('test', e.currentTarget);  
            });  
            document.getElementById('revisionMode').addEventListener('click', (e) => {  
                setActiveMode('revision', e.currentTarget);  
            });  
            document.getElementById('weaknessMode').addEventListener('click', (e) => {  
                setActiveMode('weakness', e.currentTarget);  
            });  
  
            // Mobile menu  
            const mobileBtn = document.getElementById('mobileMenuBtn');  
            const sidebar = document.getElementById('sidebar');  
            mobileBtn.addEventListener('click', () => {  
                sidebar.classList.toggle('sidebar-hidden');  
            });  
  
            // Close sidebar when clicking outside on mobile  
            document.addEventListener('click', (e) => {  
                if (window.innerWidth < 1024) {  
                    if (!sidebar.contains(e.target) && !mobileBtn.contains(e.target) && !sidebar.classList.contains('sidebar-hidden')) {  
                        sidebar.classList.add('sidebar-hidden');  
                    }  
                }  
            });  
  
            // Graph refresh  
            document.getElementById('refreshGraphs').addEventListener('click', () => {  
                renderGraphs();  
            });  
        }  
  
        function setActiveMode(mode, buttonElement) {  
            state.selectedMode = mode;  
            const modes = ['learnMode', 'testMode', 'revisionMode', 'weaknessMode'];  
            modes.forEach(modeId => {  
                const btn = document.getElementById(modeId);  
                if (btn) {  
                    btn.classList.remove('active', 'bg-active-blue/20');  
                    btn.classList.add('bg-transparent', 'border', 'border-secondary-gray');  
                }  
            });  
            buttonElement.classList.remove('bg-transparent', 'border', 'border-secondary-gray');  
            buttonElement.classList.add('active', 'bg-active-blue/20');  
            saveState();  
            updateWorkArea();  
        }  
  
        function renderSidebar() {  
            // Set active subject  
            document.querySelectorAll('.subject-btn').forEach(btn => {  
                if (btn.dataset.subject === state.selectedSubject) {  
                    btn.classList.add('active', 'bg-active-blue/20', 'border-active-blue');  
                }  
            });  
  
            // Set active mode  
            const modeMap = {  
                'learn': 'learnMode',  
                'test': 'testMode',  
                'revision': 'revisionMode',  
                'weakness': 'weaknessMode'  
            };  
            const activeModeId = modeMap[state.selectedMode];  
            if (activeModeId) {  
                const activeBtn = document.getElementById(activeModeId);  
                if (activeBtn) {  
                    activeBtn.classList.remove('bg-transparent', 'border', 'border-secondary-gray');  
                    activeBtn.classList.add('active', 'bg-active-blue/20');  
                }  
            }  
        }  
  
        // Update Work Area  
        function updateWorkArea() {  
            const workArea = document.getElementById('workArea');  
            const mode = state.selectedMode;  
            const subject = state.selectedSubject;  
  
            let content = '';  
            switch(mode) {  
                case 'learn':  
                    content = `  
                        <div class="max-w-4xl mx-auto">  
                            <h2 class="text-3xl font-bold mb-6">📖 Learning: ${subject}</h2>  
                            <div class="bg-card-bg rounded-xl p-6 border border-border-color mb-6">  
                                <h3 class="text-xl font-semibold mb-4">Today's Topics</h3>  
                                <div class="space-y-3">  
                                    <div class="flex items-center p-3 bg-primary-bg rounded-lg">  
                                        <input type="checkbox" class="mr-3 w-5 h-5">  
                                        <span>Introduction to ${subject} fundamentals</span>  
                                    </div>  
                                    <div class="flex items-center p-3 bg-primary-bg rounded-lg">  
                                        <input type="checkbox" class="mr-3 w-5 h-5">  
                                        <span>Key concepts and formulas</span>  
                                    </div>  
                                    <div class="flex items-center p-3 bg-primary-bg rounded-lg">  
                                        <input type="checkbox" class="mr-3 w-5 h-5">  
                                        <span>Practice problems (10 questions)</span>  
                                    </div>  
                                </div>  
                            </div>  
                            <div class="bg-card-bg rounded-xl p-6 border border-border-color">  
                                <h3 class="text-xl font-semibold mb-4">📚 Study Materials</h3>  
                                <p class="text-secondary-gray">Interactive content for ${subject} will appear here. Start with the topics above to build your foundation.</p>  
                            </div>  
                        </div>  
                    `;  
                    break;  
                case 'test':  
                    content = `  
                        <div class="max-w-4xl mx-auto">  
                            <h2 class="text-3xl font-bold mb-6">🧪 Test Mode: ${subject}</h2>  
                            <div class="bg-card-bg rounded-xl p-6 border border-border-color">  
                                <h3 class="text-xl font-semibold mb-4">Practice Test</h3>  
                                <div class="space-y-6">  
                                    <div class="p-4 bg-primary-bg rounded-lg">  
                                        <p class="font-semibold mb-3">Question 1: What is the fundamental concept of ${subject}?</p>  
                                        <div class="space-y-2 ml-4">  
                                            <label class="flex items-center"><input type="radio" name="q1" class="mr-2"> Option A</label>  
                                            <label class="flex items-center"><input type="radio" name="q1" class="mr-2"> Option B</label>  
                                            <label class="flex items-center"><input type="radio" name="q1" class="mr-2"> Option C</label>  
                                            <label class="flex items-center"><input type="radio" name="q1" class="mr-2"> Option D</label>  
                                        </div>  
                                    </div>  
                                    <button class="bg-active-blue text-white px-6 py-2 rounded-lg hover:bg-blue-700">Submit Test</button>  
                                </div>  
                            </div>  
                        </div>  
                    `;  
                    break;  
                case 'revision':  
                    content = `  
                        <div class="max-w-4xl mx-auto">  
                            <h2 class="text-3xl font-bold mb-6">🔄 Revision: ${subject}</h2>  
                            <div class="bg-card-bg rounded-xl p-6 border border-border-color">  
                                <h3 class="text-xl font-semibold mb-4">Due for Revision</h3>  
                                <div class="space-y-3">  
                                    <div class="p-3 bg-warning-orange/10 border border-warning-orange rounded-lg">  
                                        <span class="font-semibold">Vectors</span> - Due today  
                                    </div>  
                                    <div class="p-3 bg-warning-orange/10 border border-warning-orange rounded-lg">  
                                        <span class="font-semibold">Thermodynamics</span> - Due tomorrow  
                                    </div>  
                                    <div class="p-3 bg-success-green/10 border border-success-green rounded-lg">  
                                        <span class="font-semibold">Integration</span> - Due in 3 days  
                                    </div>  
                                </div>  
                            </div>  
                        </div>  
                    `;  
                    break;  
                case 'weakness':  
                    content = `  
                        <div class="max-w-4xl mx-auto">  
                            <h2 class="text-3xl font-bold mb-6">⚠️ Weak Areas Analysis</h2>  
                            <div class="bg-card-bg rounded-xl p-6 border border-border-color">  
                                <h3 class="text-xl font-semibold mb-4">Topics Needing Improvement</h3>  
                                <div class="space-y-4">  
                                    ${state.weakTopics.map(topic => `  
                                        <div class="p-4 bg-weak-red/10 border border-weak-red rounded-lg">  
                                            <div class="flex justify-between mb-2">  
                                                <span class="font-semibold">${topic}</span>  
                                                <span class="text-weak-red">Low Score</span>  
                                            </div>  
                                            <div class="w-full bg-primary-bg rounded-full h-2">  
                                                <div class="bg-weak-red h-2 rounded-full" style="width: 45%"></div>  
                                            </div>  
                                            <p class="text-sm text-secondary-gray mt-2">Recommended: Practice 10 more questions</p>  
                                        </div>  
                                    `).join('')}  
                                </div>  
                            </div>  
                        </div>  
                    `;  
                    break;  
                default:  
                    content = '<div class="text-center text-secondary-gray">Select a mode to begin</div>';  
            }  
            workArea.innerHTML = content;  
        }  
  
        // Metrics  
        function renderMetrics() {  
            const avgPerformance = Object.values(state.performanceData).reduce((a, b) => a + b, 0) / Object.values(state.performanceData).length;  
            document.getElementById('performancePct').textContent = `${Math.round(avgPerformance)}%`;  
            document.getElementById('weakAreas').textContent = state.weakTopics.length;  
            document.getElementById('pendingTasks').textContent = state.pendingTasksCount;  
            document.getElementById('nextRevision').textContent = state.nextRevisionDate;  
        }  
  
        // Graphs  
        function renderGraphs() {  
            setTimeout(() => {  
                renderTrendGraph();  
                renderAccuracyGraph();  
                renderWeaknessHeatmap();  
            }, 100);  
        }  
  
        function renderTrendGraph() {  
            const canvas = document.getElementById('trendCanvas');  
            if (!canvas) return;  
            
            const ctx = canvas.getContext('2d');  
            const container = canvas.parentElement;  
            const width = container.clientWidth - 20;  
            const height = container.clientHeight - 20;  
            
            canvas.width = width;  
            canvas.height = height;  
  
            const data = state.testResults.length ? state.testResults.map(r => r.score) : [65, 72, 78, 85, 89];  
            const max = Math.max(...data, 100);  
            const min = Math.min(...data, 50);  
            const range = max - min;  
            
            ctx.clearRect(0, 0, width, height);  
              
            // Grid  
            ctx.strokeStyle = '#1F2937';  
            ctx.lineWidth = 1;  
            ctx.fillStyle = '#9CA3AF';  
            ctx.font = '10px sans-serif';  
            
            for (let i = 0; i <= 5; i++) {  
                const y = 20 + (height - 40) * (5 - i) / 5;  
                ctx.beginPath();  
                ctx.moveTo(40, y);  
                ctx.lineTo(width - 20, y);  
                ctx.stroke();  
                const value = Math.round(min + (range * i / 5));  
                ctx.fillText(`${value}%`, 5, y + 3);  
            }  
  
            if (data.length === 0) return;  
            
            // Line  
            ctx.strokeStyle = '#3B82F6';  
            ctx.lineWidth = 3;  
            ctx.lineJoin = 'round';  
            ctx.lineCap = 'round';  
            ctx.beginPath();  
            
            data.forEach((value, i) => {  
                const x = 40 + (width - 60) * i / (data.length - 1 || 1);  
                const y = 20 + (height - 40) * (1 - (value - min) / (range || 1));  
                if (i === 0) ctx.moveTo(x, y);  
                else ctx.lineTo(x, y);  
            });  
            ctx.stroke();  
  
            // Dots and labels  
            data.forEach((value, i) => {  
                const x = 40 + (width - 60) * i / (data.length - 1 || 1);  
                const y = 20 + (height - 40) * (1 - (value - min) / (range || 1));  
                ctx.fillStyle = '#3B82F6';  
                ctx.beginPath();  
                ctx.arc(x, y, 6, 0, Math.PI * 2);  
                ctx.fill();  
                ctx.fillStyle = '#0B0F1A';  
                ctx.beginPath();  
                ctx.arc(x, y, 3, 0, Math.PI * 2);  
                ctx.fill();  
                ctx.fillStyle = '#9CA3AF';  
                ctx.font = '10px sans-serif';  
                ctx.fillText(state.testResults[i]?.date || `Test ${i + 1}`, x - 15, y - 8);  
            });  
        }  
  
        function renderAccuracyGraph() {  
            const canvas = document.getElementById('accuracyCanvas');  
            if (!canvas) return;  
            
            const ctx = canvas.getContext('2d');  
            const container = canvas.parentElement;  
            const width = container.clientWidth - 20;  
            const height = container.clientHeight - 20;  
            
            canvas.width = width;  
            canvas.height = height;  
  
            const subjects = Object.keys(state.performanceData);  
            const data = subjects.map(s => state.performanceData[s]);  
            const barWidth = Math.max(25, (width - 60) / subjects.length);  
            const maxHeight = height - 50;  
  
            ctx.clearRect(0, 0, width, height);  
  
            // Bars  
            data.forEach((value, i) => {  
                const x = 40 + i * barWidth + 5;  
                const barHeight = (maxHeight * value) / 100;  
                const gradient = ctx.createLinearGradient(x, height - 20, x, height - 20 - barHeight);  
                const color = getPerformanceColor(value);  
                gradient.addColorStop(0, color);  
                gradient.addColorStop(1, color.replace('1)', '0.7)'));  
  
                ctx.fillStyle = gradient;  
                ctx.fillRect(x, height - 20 - barHeight, barWidth - 10, barHeight);  
  
                // Label  
                ctx.fillStyle = 'white';  
                ctx.font = '10px sans-serif';  
                ctx.textAlign = 'center';  
                const shortName = subjects[i].slice(0, 3);  
                ctx.fillText(shortName, x + barWidth / 2, height - 5);  
                ctx.fillStyle = '#9CA3AF';  
                ctx.fillText(`${value}%`, x + barWidth / 2, height - 20 - barHeight - 5);  
            });  
        }  
  
        function getPerformanceColor(value, alpha = 1) {  
            if (value >= 85) return `rgba(16, 185, 129, ${alpha})`;  
            if (value >= 70) return `rgba(245, 158, 11, ${alpha})`;  
            return `rgba(239, 68, 68, ${alpha})`;  
        }  
  
        function renderWeaknessHeatmap() {  
            const container = document.getElementById('weaknessHeatmap');  
            if (!container) return;  
  
            const weakTopicsMap = {  
                'Mathematics': ['Vectors', 'Integration', 'Probability'],  
                'Physics': ['Thermodynamics', 'Optics', 'Modern Physics'],  
                'Chemistry': ['Organic Chemistry', 'Chemical Bonding'],  
                'Biology': ['Genetics', 'Ecology'],  
                'Computer Science': ['Algorithms', 'Data Structures'],  
                'English': ['Grammar', 'Vocabulary']  
            };  
  
            const currentSubject = state.selectedSubject;  
            const topics = weakTopicsMap[currentSubject] || state.weakTopics;  
  
            container.innerHTML = topics.map(topic => `  
                <div class="bg-weak-red/20 border border-weak-red rounded-lg p-3">  
                    <div class="flex justify-between items-center">  
                        <span class="font-medium">${topic}</span>  
                        <span class="text-xs text-weak-red">⚠️ Needs attention</span>  
                    </div>  
                    <div class="w-full bg-primary-bg rounded-full h-1.5 mt-2">  
                        <div class="bg-weak-red h-1.5 rounded-full" style="width: ${Math.floor(Math.random() * 40 + 30)}%"></div>  
                    </div>  
                </div>  
            `).join('');  
  
            if (topics.length === 0) {  
                container.innerHTML = '<div class="text-secondary-gray text-center p-4">No weak areas detected!</div>';  
            }  
        }  
  
        // Start the app  
        init();  
    </script>  
</body>  
</html>
