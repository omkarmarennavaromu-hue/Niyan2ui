    <script>  
        // GLOBAL STATE  
        let state = {  
            name: 'Student',  
            class: '12',  
            exam: 'JEE',  
            selectedSubject: 'Mathematics',  
            studyEntries: [],  
            testResults: [],  
            performanceData: {  
                Mathematics: 85,  
                Physics: 78,  
                Chemistry: 92,  
                Biology: 88,  
                'Computer Science': 76,  
                English: 94  
            },  
            weakTopics: ['Vectors', 'Thermodynamics', 'Integration']  
        };  
  
        // Initialize  
        function init() {  
            loadState();  
            renderSidebar();  
            renderMetrics();  
            renderGraphs();  
            updateWorkArea();  
            setupEventListeners();  
        }  
  
        // LocalStorage  
        function saveState() {  
            localStorage.setItem('niyantra_state', JSON.stringify(state));  
        }  
  
        function loadState() {  
            const saved = localStorage.getItem('niyantra_state');  
            if (saved) {  
                state = { ...state, ...JSON.parse(saved) };  
            }  
            document.getElementById('profileName').value = state.name;  
            document.getElementById('classSelect').value = state.class;  
            document.getElementById('examSelect').value = state.exam;  
        }  
  
        // Sidebar Events  
        function setupEventListeners() {  
            // Profile  
            document.getElementById('profileName').addEventListener('input', (e) => {  
                state.name = e.target.value || 'Student';  
                saveState();  
                renderMetrics();  
            });  
  
            // Selectors  
            document.getElementById('classSelect').addEventListener('change', (e) => {  
                state.class = e.target.value;  
                saveState();  
                updateWorkArea();  
            });  
  
            document.getElementById('examSelect').addEventListener('change', (e) => {  
                state.exam = e.target.value;  
                saveState();  
                updateWorkArea();  
            });  
  
            // Subjects  
            document.querySelectorAll('.subject-btn').forEach(btn => {  
                btn.addEventListener('click', (e) => {  
                    document.querySelector('.subject-btn.active')?.classList.remove('active', 'bg-active-blue/20', 'border-active-blue');  
                    e.target.classList.add('active', 'bg-active-blue/20', 'border-active-blue');  
                    state.selectedSubject = e.target.dataset.subject;  
                    saveState();  
                    updateWorkArea();  
                });  
            });  
  
            // Mode buttons  
            document.querySelectorAll('.mode-btn').forEach(btn => {  
                btn.addEventListener('click', (e) => {  
                    document.querySelector('.mode-btn.active')?.classList.remove('active', 'bg-active-blue/20', 'bg-active-blue/30');  
                    e.target.classList.add('active', 'bg-active-blue/20');  
                    updateWorkArea();  
                });  
            });  
  
            // Mobile menu  
            document.getElementById('mobileMenuBtn').addEventListener('click', () => {  
                const sidebar = document.getElementById('sidebar');  
                sidebar.classList.toggle('sidebar-hidden');  
            });  
  
            // Graph refresh  
            document.getElementById('refreshGraphs').addEventListener('click', renderGraphs);  
        }  
  
        function renderSidebar() {  
            document.querySelector('.subject-btn[data-subject="${state.selectedSubject}"]')?.classList.add('active', 'bg-active-blue/20', 'border-active-blue');  
            document.querySelector('.mode-btn#learnMode').classList.add('active', 'bg-active-blue/20');  
        }  
  
        // Metrics  
        function renderMetrics() {  
            document.getElementById('performancePct').textContent = '87%';  
            document.getElementById('weakAreas').textContent = state.weakTopics.length;  
            document.getElementById('pendingTasks').textContent = Math.floor(Math.random() * 10) + 3;  
            document.getElementById('nextRevision').textContent = ['Today', 'Tomorrow', 'In 2 days'][Math.floor(Math.random() * 3)];  
        }  
  
        // Graphs  
        function renderGraphs() {  
            renderTrendGraph();  
            renderAccuracyGraph();  
            renderWeaknessHeatmap();  
        }  
  
        function renderTrendGraph() {  
            const canvas = document.getElementById('trendCanvas');  
            const ctx = canvas.getContext('2d');  
            canvas.width = canvas.offsetWidth;  
            canvas.height = canvas.offsetHeight;  
  
            const data = state.testResults.length ? state.testResults.map(r => r.score) : [60, 72, 81, 87, 92];  
            const max = Math.max(...data, 100);  
            const labels = state.testResults.map((_, i) => `T${i + 1}`);  
  
            ctx.clearRect(0, 0, canvas.width, canvas.height);  
              
            // Grid  
            ctx.strokeStyle = '#1F2937';  
            ctx.lineWidth = 1;  
            for (let i = 0; i < 6; i++) {  
                const y = (canvas.height - 40) * (5 - i) / 5;  
                ctx.beginPath();  
                ctx.moveTo(60, y);  
                ctx.lineTo(canvas.width - 20, y);  
                ctx.stroke();  
            }  
  
            // Line  
            ctx.strokeStyle = '#3B82F6';  
            ctx.lineWidth = 3;  
            ctx.lineJoin = 'round';  
            ctx.lineCap = 'round';  
            ctx.beginPath();  
            data.forEach((value, i) => {  
                const x = 80 + (canvas.width - 100) * i / (data.length - 1);  
                const y = canvas.height - 30 - (canvas.height - 70) * value / max;  
                if (i === 0) ctx.moveTo(x, y);  
                else ctx.lineTo(x, y);  
            });  
            ctx.stroke();  
  
            // Dots  
            data.forEach((value, i) => {  
                const x = 80 + (canvas.width - 100) * i / (data.length - 1);  
                const y = canvas.height - 30 - (canvas.height - 70) * value / max;  
                ctx.fillStyle = '#3B82F6';  
                ctx.beginPath();  
                ctx.arc(x, y, 6, 0, Math.PI * 2);  
                ctx.fill();  
                ctx.fillStyle = '#0B0F1A';  
                ctx.beginPath();  
                ctx.arc(x, y, 3, 0, Math.PI * 2);  
                ctx.fill();  
            });  
        }  
  
        function renderAccuracyGraph() {  
            const canvas = document.getElementById('accuracyCanvas');  
            const ctx = canvas.getContext('2d');  
            canvas.width = canvas.offsetWidth;  
            canvas.height = canvas.offsetHeight;  
  
            const subjects = Object.keys(state.performanceData);  
            const data = subjects.map(s => state.performanceData[s]);  
            const barWidth = (canvas.width - 60) / subjects.length;  
            const maxHeight = canvas.height - 50;  
  
            ctx.clearRect(0, 0, canvas.width, canvas.height);  
  
            // Bars  
            data.forEach((value, i) => {  
                const x = 50 + i * barWidth + 5;  
                const height = (maxHeight * value) / 100;  
                const gradient = ctx.createLinearGradient(x, canvas.height, x, canvas.height - height);  
                gradient.addColorStop(0, getPerformanceColor(value));  
                gradient.addColorStop(1, getPerformanceColor(value, 0.7));  
  
                ctx.fillStyle = gradient;  
                ctx.fillRect(x, canvas.height - height - 20, barWidth - 10, height + 20);  
  
                // Label  
                ctx.fillStyle = 'white';  
                ctx.font = '12px sans-serif';  
                ctx.textAlign = 'center';  
                ctx.fillText(subjects[i].slice(0, 3), x + barWidth / 2, canvas.height - 5);  
                ctx.fillText(`${value}%`, x + barWidth / 2, canvas.height - height - 25);  
            });  
        }  
  
        function getPerformanceColor(value, alpha = 1) {  
            if (value >= 85) return `rgba(16, 185, 129, ${alpha})`;  
            if (value >= 70) return `rgba(245, 158, 11, ${alpha})`;  
            return `rgba(239, 68, 68, ${alpha})`;  
        }
