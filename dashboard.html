    :root {

      --red: #EF4444;
      --orange: #F59E0B;
      --green: #10B981;
      --blue: #3B82F6;
      --gray: #9CA3AF;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: #F3F4F6;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #0F172A; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #4B5563; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
    }
    .soft-hover {
      transition: transform 300ms ease, opacity 300ms ease, border-color 300ms ease, background-color 300ms ease;
    }
    .soft-hover:hover {
      transform: translateY(-2px);
      opacity: 0.98;
    }
    .metric-glow {
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .canvas-wrap {
      position: relative;
      width: 100%;
      height: 220px;
    }
    .canvas-wrap canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
